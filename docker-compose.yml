services:
  graphhopper:
    build:
      context: infrastructure/graphhopper
      args:
        GRAPHHOPPER_VERSION: "11.0"
    ports:
      - "8989:8989"
    environment:
      JAVA_OPTS: ${JAVA_OPTS:--Xms1g -Xmx4g}
    volumes:
      - ./data/osm:/data/osm:ro
      - ./data/graph-cache:/data/graph-cache
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8989/info"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 5m

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      GRAPHHOPPER_URL: http://graphhopper:8989
      GRAPHHOPPER_TIMEOUT_SECONDS: "60"
      SUGARGLIDER_GENERATION_MAX_EVALUATIONS: "48"
      SUGARGLIDER_GENERATION_MAX_OPTIONAL_SNAP_DISPLACEMENT_M: "300"
      SUGARGLIDER_LOW_OVERLAP_MAX_PATHS: "3"
      SUGARGLIDER_LOW_OVERLAP_MAX_WEIGHT_FACTOR: "1.6"
      SUGARGLIDER_LOW_OVERLAP_MAX_SHARE_FACTOR: "0.5"
      SUGARGLIDER_LOW_OVERLAP_BEAM_WIDTH: "12"
      SUGARGLIDER_LOW_OVERLAP_MAX_LEG_REQUESTS: "48"
      SUGARGLIDER_LOW_OVERLAP_SOURCE_COUNT: "2"
      SUGARGLIDER_MAP_TILE_URL: ${SUGARGLIDER_MAP_TILE_URL:-https://tile.openstreetmap.org/{z}/{x}/{y}.png}
      SUGARGLIDER_MAP_ATTRIBUTION: ${SUGARGLIDER_MAP_ATTRIBUTION:-© OpenStreetMap contributors}
      SUGARGLIDER_MAP_INITIAL_LAT: ${SUGARGLIDER_MAP_INITIAL_LAT:-48.87}
      SUGARGLIDER_MAP_INITIAL_LON: ${SUGARGLIDER_MAP_INITIAL_LON:-2.10}
      SUGARGLIDER_MAP_INITIAL_ZOOM: ${SUGARGLIDER_MAP_INITIAL_ZOOM:-11.0}
      SUGARGLIDER_NATURE_INDEX_PATH: ${SUGARGLIDER_NATURE_INDEX_PATH:-/data/nature/ile-de-france-nature-index.json.gz}
      SUGARGLIDER_NATURE_WATER_BUFFER_M: ${SUGARGLIDER_NATURE_WATER_BUFFER_M:-100}
      SUGARGLIDER_NATURE_MISSING_INDEX_WARNING: ${SUGARGLIDER_NATURE_MISSING_INDEX_WARNING:-false}
      SUGARGLIDER_POI_INDEX_PATH: ${SUGARGLIDER_POI_INDEX_PATH:-/data/pois/ile-de-france-poi-index.json.gz}
      SUGARGLIDER_POI_MISSING_INDEX_WARNING: ${SUGARGLIDER_POI_MISSING_INDEX_WARNING:-false}
      SUGARGLIDER_POI_DEFAULT_LIMIT: ${SUGARGLIDER_POI_DEFAULT_LIMIT:-500}
      SUGARGLIDER_POI_MAX_LIMIT: ${SUGARGLIDER_POI_MAX_LIMIT:-1000}
    volumes:
      - ./data/nature:/data/nature:ro
      - ./data/pois:/data/pois:ro
    depends_on:
      graphhopper:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
